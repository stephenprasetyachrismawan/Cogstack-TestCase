<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CogStack NLP Clinical Tester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/panels.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">CogStack/NLP clinical tester</div>
      <input id="apiBase" class="api-base" type="text" aria-label="API Base URL" />
      <button class="btn" id="pingBtn">Ping</button>
      <span id="statusDot" class="status-dot"></span>
      <span id="statusLabel" class="small">unknown</span>
      <span id="progressPill" class="pill">Progress 0/22</span>
    </header>
    <aside class="sidebar" id="sidebarNav"></aside>
    <main class="main" id="mainContent"></main>
  </div>
  <script src="./js/data.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
